name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commit types that release-please understands.
          # Must include every type used in release-please-config.json
          # changelog-sections, plus chore (used by release-please's own
          # release PRs) and the rest of the standard set.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            ci
            build
            chore
            style
            revert
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The PR title subject must start with a lowercase letter
            (e.g. "feat: add login flow", not "feat: Add login flow").
